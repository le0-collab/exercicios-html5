<!DOCTYPE html>
<html lang="pt-br">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Fontes externas</title>
 <style>
  @font-face {
   font-family: 'Love';
   src: url('fonts/love.ttf') format('truetype');
   font-weight: normal;
   font-style: normal;
   /* tipos de format()
     -opentype(otf)
     -truetype(ttf)
     -embedded-opentype
     -truetype-aat(Apple Advanced Typografy)
     -svg
   */
  }
  body {
   font-family: Arial, Helvetica, sans-serif;
  }
  h1 {
   font-family: 'Love', times, serif;
   font-size: 2.5em;
   font-weight: normal;
  }
 </style>
</head>
<body>
 <h1>Titulo</h1>
 <p>Esse é um texto de demonstração para meu exercício 018, com o tema sendo fontes externas.</p>
</body>
</html>
