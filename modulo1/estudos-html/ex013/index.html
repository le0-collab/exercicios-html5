<!DOCTYPE html>
<html lang="pt-br">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>Adicionando video</title>
</head>

<body>
 <h1>Inserindo videos hospedados localmente</h1>
 <p>Este video está hospedado no meu próprio servidor.</p>
 <video width="250" poster="imagem/capa.jpg" controls loop>
  <source src="midias/video.mp4" type="video/mp4"/>
  <p>Seu navegador não é compatível com o vídeo</p>
 </video>
 <h1>Inserindo videos do youtube aqui</h1>
 <iframe
    width="355"
    height="200"
    src="https://www.youtube.com/embed/L2PO0wngHKo"
    title="YouTube video player"
    frameborder="0"
    allowfullscreen>
</iframe>
</body>

</html>
