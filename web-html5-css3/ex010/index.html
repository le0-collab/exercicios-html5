<!DOCTYPE html>
<html lang="pt-br">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>Imagens dinâmicas</title>
</head>

<body>
 <h1>Aqui abaixo está a imagem proporcional ao tamanho da tela</h1>
 <picture>
  <source media="(max-width:750px)" srcset="imagem/p.jpeg" type="image/jpeg">
  <source media="(max-width:1000px)" srcset="imagem/m.png" type="image/png">
  <img src="imagem/g.png" alt="imagem flexível">
 </picture>
 <h2>Aqui abaixo esta um aquivo mp3 para tocar</h2>
 <audio preload="metadata" controls>
  <source src="midia/musica.mp3" type="audio/mpeg">
  <p>O seu navegador nao suporta a reprodução desse áudio</p>
 </audio>
</body>

</html>
