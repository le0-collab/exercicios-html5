<!DOCTYPE html>
<html lang="pt-br">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>Tags</title>
</head>

<body>
 <h1>Tags em HTML</h1>
 <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deveerá utilizar em cada caso</p>
 <ul>
   <li><abbr title="Tag &lt;p&gt;">Parágrafos </abbr></li>
   <li><abbr title="Tag &lt;h1&gt; a &lt;h6&gt;">Títulos</abbr></li>
   <li><abbr title="Tag &lt;img&gt;">Imagens</abbr></li>
   <li><abbr title="Tag &lt;abbr&gt;">Abreviações</abbr></li>
   <li><abbr title="Tag &lt;code&gt;">Códigos-Fontes</abbr></li>
   <li><abbr title="Tag &lt;ol&gt; &lt;li&gt;">Lista numeradas</abbr></li>
   <li><abbr title="Tag &lt;ul&gt; &lt;li&gt;">Lista com demarcadores</abbr></li>
 </ul>
 
</body>

</html>
